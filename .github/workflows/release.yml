name: Release

# Tag a commit with the plugin version (no leading "v", matching manifest.json),
# e.g. `git tag 1.0.0 && git push origin 1.0.0`, to build and publish a release
# with the three Obsidian artifacts attached.
on:
  push:
    tags:
      - '*.*.*'

defaults:
  run:
    working-directory: obsidian-plugin

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: obsidian-plugin/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            obsidian-plugin/main.js
            obsidian-plugin/manifest.json
            obsidian-plugin/styles.css
          fail_on_unmatched_files: true
